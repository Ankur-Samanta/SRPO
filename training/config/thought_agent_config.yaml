- name: thought_agent
  _target_: training.thought_agent_loop.ThoughtAgentLoop
  max_thoughts: 20
  max_tokens_per_thought: 256
  thought_delimiter: "</thought>"
  use_examples: false

- name: thought_ics_agent
  _target_: training.thought_ics_agent_loop.ThoughtICSAgentLoop
  max_thoughts: 20
  max_tokens_per_thought: 256
  thought_delimiter: "</thought>"
  use_examples: false
  autonomy_level: 2
  localization_temp: 0.3
  localization_max_tokens: 4096
  # Localization training (off by default — enable via trainloc config variant)
  train_localization: false
  localization_rollout_n: 4
  localization_rollout_temp: 1.0
  max_loc_groups_per_prompt: 3
  loc_response_length: 512
  loc_seq_length: 4096

